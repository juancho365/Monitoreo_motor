<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Guard - Mantenimiento Predictivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; }
       .status-card { border-radius: 15px; transition: 0.3s; }
       .health-good { background-color: #28a745; color: white; }
       .health-warning { background-color: #ffc107; color: black; }
       .health-danger { background-color: #dc3545; color: white; }
       .data-value { font-size: 2.5rem; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-cpu"></i> Siemens Motor Monitor</span>
    </div>
</nav>

<div class="container text-center">
    <div class="row g-4">
        
        <div class="col-md-4">
            <div id="healthCard" class="card status-card h-100 shadow p-3 health-good">
                <h5>Estado del Motor</h5>
                <div id="motorStatus" class="data-value">NORMAL</div>
                <p id="healthAdvice">Operación dentro de límites</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card status-card h-100 shadow p-3 bg-white">
                <h5 class="text-muted">Temperatura PT100</h5>
                <div id="tempVal" class="data-value text-primary">-- °C</div>
                <p>Ultima actualización: <span id="lastUpdate">--:--</span></p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card status-card h-100 shadow p-3 bg-white text-dark">
                <h5 class="text-muted text-dark">Conectividad LoRa</h5>
                <div id="rssiVal" class="data-value text-success">-00 dBm</div>
                <p id="rssiStatus">Señal Excelente</p>
            </div>
        </div>

        <div class="col-12 mt-4">
            <div class="card shadow p-2">
                <h5>Tendencia Térmica Industrial</h5>
                <div class="ratio ratio-21x9">
                    <iframe src="https://thingspeak.com/channels/TU_ID_CANAL/charts/1?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&type=line"></iframe>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // CONFIGURACIÓN: Reemplaza con tus datos de ThingSpeak
    const CHANNEL_ID = 'TU_ID_CANAL'; 
    const READ_API_KEY = 'TU_READ_API_KEY'; 

    async function updateDashboard() {
        try {
            // Petición a la API de ThingSpeak 
            const response = await fetch(`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json?api_key=${READ_API_KEY}`);
            const data = await response.json();

            const temp = parseFloat(data.field1); // Campo de temperatura
            const rssi = data.field2 |

 -50;       // Si tienes RSSI en Field 2
            const time = new Date(data.created_at).toLocaleTimeString();

            // Actualizar Interfaz
            document.getElementById('tempVal').innerText = temp.toFixed(1) + ' °C';
            document.getElementById('lastUpdate').innerText = time;
            document.getElementById('rssiVal').innerText = rssi + ' dBm';

            // Lógica de Mantenimiento Preventivo (Semáforo) 
            const healthCard = document.getElementById('healthCard');
            const statusText = document.getElementById('motorStatus');
            const advice = document.getElementById('healthAdvice');

            if (temp < 65) {
                healthCard.className = 'card status-card h-100 shadow p-3 health-good';
                statusText.innerText = 'OPTIMO';
                advice.innerText = 'Sin riesgo para aislamiento Clase F';
            } else if (temp >= 65 && temp < 85) {
                healthCard.className = 'card status-card h-100 shadow p-3 health-warning';
                statusText.innerText = 'ALERTA';
                advice.innerText = 'Programar inspección visual pronto';
            } else {
                healthCard.className = 'card status-card h-100 shadow p-3 health-danger';
                statusText.innerText = 'CRÍTICO';
                advice.innerText = 'RIESGO DE FALLO: Reducir carga motor';
            }

        } catch (error) {
            console.error('Error obteniendo datos:', error);
        }
    }

    // Actualizar cada 20 segundos (límite de ThingSpeak Free) 
    setInterval(updateDashboard, 20000);
    updateDashboard(); // Carga inicial
</script>

</body>
</html>
